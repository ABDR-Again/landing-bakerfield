<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fcfbf8;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .message-container {
      text-align: center;
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .icon {
      width: 80px;
      height: 80px;
      background-color: #dcfce3;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      color: #16a34a;
    }
    h1 {
      font-size: 2.5rem;
      color: #111827;
      margin: 0 0 0.5rem 0;
    }
    p {
      font-size: 1.2rem;
      color: #4b5563;
      margin: 0;
    }
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="message-container">
    <div class="icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>
    <h1>Lead Submitted!</h1>
    <p>Thank you.</p>
    <p id="redirect-text" style="font-size: 1rem; color: #6b7280; margin-top: 1rem;">You will be redirected to our website in <span id="countdown">3</span> seconds...</p>
  </div>
  
  <script>
    let seconds = 3;
    const countdownEl = document.getElementById('countdown');
    const redirectUrl = 'https://bakersfieldhomesolutions.com/';
    
    const interval = setInterval(() => {
      seconds--;
      if (countdownEl) countdownEl.textContent = seconds;
      
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = redirectUrl;
      }
    }, 1000);
  </script>
</body>
</html>
